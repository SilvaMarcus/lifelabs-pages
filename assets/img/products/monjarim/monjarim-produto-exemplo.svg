<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Imagem ilustrativa do Monjarim</title>
  <desc id="desc">Mockup original e ilustrativo para substituir por imagem autorizada do produto.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#155e4d"/>
      <stop offset="1" stop-color="#0f2f27"/>
    </linearGradient>
  </defs>
  <rect width="720" height="720" fill="url(#bg)"/>
  <ellipse cx="360" cy="605" rx="210" ry="35" fill="#0f2f27" opacity="0.18"/>
  <rect x="200" y="130" width="320" height="440" rx="38" fill="url(#box)"/>
  <rect x="226" y="156" width="268" height="388" rx="28" fill="#ffffff" opacity="0.96"/>
  <circle cx="360" cy="248" r="66" fill="#a7f3d0"/>
