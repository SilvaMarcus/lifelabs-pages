  <text x="360" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#166534">Conteúdo informativo</text>
  <text x="360" y="463" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">Substitua por imagem</text>
  <text x="360" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#475569">oficial/autorizada</text>
</svg>
